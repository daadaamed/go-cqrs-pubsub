services:
  postgres:
    image: postgres:16-alpine
    container_name: todo-postgres
    environment:
      POSTGRES_USER: todo
      POSTGRES_PASSWORD: todo
      POSTGRES_DB: todo
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U todo -d todo"]
      interval: 3s
      timeout: 3s
      retries: 10

  pubsub:
    image: gcr.io/google.com/cloudsdktool/google-cloud-cli:emulators
    container_name: todo-pubsub
    command: >
      gcloud beta emulators pubsub start
      --host-port=0.0.0.0:8085
      --project=todo-local
    ports:
      - "8085:8085"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8085 || exit 1"]
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
